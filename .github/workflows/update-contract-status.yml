name: Update Contract Status

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-status:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: 查找关联契约
        id: find-contract
        uses: ./.github/actions/find-contract
        with:
          pr_body: ${{ github.event.pull_request.body }}
          branch: ${{ github.event.pull_request.head.ref }}

      - name: 更新契约状态
        if: steps.find-contract.outputs.found == 'true'
        uses: actions/github-script@v7
        env:
          CONTRACT_FILE: ${{ steps.find-contract.outputs.contract_file }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        with:
          script: |
            const contractFile = process.env.CONTRACT_FILE;
            const prUrl = process.env.PR_URL;
            const baseRef = process.env.BASE_REF;

            if (!contractFile) {
              core.info('ℹ️ 未找到匹配契约文件，跳过状态更新');
              return;
            }

            // Read current file via GitHub API (gets SHA for atomic update)
            let fileData;
            try {
              const response = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: contractFile,
                ref: baseRef,
              });
              fileData = response.data;
            } catch (e) {
              core.warning(`无法读取契约文件 ${contractFile}：${e.message}`);
              return;
            }

            const originalContent = Buffer.from(fileData.content, 'base64').toString('utf-8');

            // Parse YAML front-matter and update status field precisely
            const fmMatch = originalContent.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n/);
            if (!fmMatch) {
              core.warning('契约文件无 YAML front-matter，跳过自动状态更新。请手动将状态改为「已实现」。');
              return;
            }

            const fmBlock = fmMatch[1];
            const fmEnd = fmMatch[0].length;
            const body = originalContent.slice(fmEnd);

            // 「草稿」不允许直接变「已实现」，必须先人工确认
            if (/^status:\s*草稿\s*$/m.test(fmBlock)) {
              core.warning('⚠️ 契约仍为「草稿」状态。请先将契约确认为「已确认」后再合并实现 PR。跳过自动状态更新。');
              return;
            }

            // 只有「已确认」才自动更新为「已实现」
            if (!/^status:\s*已确认\s*$/m.test(fmBlock)) {
              core.info('ℹ️ 契约状态无需更新（当前状态非「已确认」）');
              return;
            }

            // Update status and linked_pr in front-matter
            let updatedFm = fmBlock.replace(/^status:\s*.+$/m, 'status: 已实现');
            updatedFm = updatedFm.replace(/^linked_pr:\s*.*$/m, `linked_pr: "${prUrl}"`);

            const updatedContent = `---\n${updatedFm}\n---\n${body}`;

            if (originalContent === updatedContent) {
              core.info('ℹ️ 契约内容无变化');
              return;
            }

            // 尝试直接写入；若分支保护阻止，回退到 PR
            const commitMsg = `chore: 契约状态更新为已实现 → ${contractFile} [skip ci]`;
            try {
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: contractFile,
                message: commitMsg,
                content: Buffer.from(updatedContent).toString('base64'),
                sha: fileData.sha,
                branch: baseRef,
              });
              core.info(`✅ 契约状态已更新：${contractFile}`);
            } catch (e) {
              if (e.status === 409) {
                core.warning('契约文件并发更新冲突，请手动更新状态');
              } else if (e.status === 403 || e.status === 422) {
                // 分支保护阻止直接写入，回退到创建 PR
                core.info('⚠️ 分支保护阻止直接写入，改用 PR 方式');
                const prNumber = context.issue.number;
                const tempBranch = `chore/contract-status-pr${prNumber}`;

                // 清理可能残留的同名分支
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${tempBranch}`,
                  });
                } catch { /* 分支不存在则忽略 */ }

                const baseData = await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${baseRef}`,
                });
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/heads/${tempBranch}`,
                  sha: baseData.data.object.sha,
                });

                const freshFile = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: contractFile,
                  ref: tempBranch,
                });
                await github.rest.repos.createOrUpdateFileContents({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: contractFile,
                  message: commitMsg,
                  content: Buffer.from(updatedContent).toString('base64'),
                  sha: freshFile.data.sha,
                  branch: tempBranch,
                });

                const newPr = await github.rest.pulls.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `chore: 契约状态 → 已实现（${contractFile}）`,
                  head: tempBranch,
                  base: baseRef,
                  body: `由 update-contract-status.yml 自动触发。\n\n关联 PR: ${prUrl}\n\n> 分支保护阻止直接写入，请合并此 PR 完成状态更新。`,
                });
                core.info(`✅ 已创建契约状态更新 PR: ${newPr.data.html_url}`);
              } else {
                core.setFailed(`更新契约状态失败：${e.message}`);
              }
            }

      - name: 警告多个匹配
        if: steps.find-contract.outputs.found == 'ambiguous'
        run: |
          echo "::warning::多个契约文件匹配，跳过自动更新：${{ steps.find-contract.outputs.matches }}"
