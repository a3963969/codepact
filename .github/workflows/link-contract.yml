name: Link Contract

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  link-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 查找关联契约
        id: find-contract
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Safe: PR body is a JS string, never interpolated into shell
            const prBody = context.payload.pull_request.body || '';
            const branch = context.payload.pull_request.head.ref || '';

            // Primary: explicit contract path in PR body
            const bodyMatch = prBody.match(/docs\/contracts\/[^\s`'"]+\.md/);
            let contractFile = null;

            if (bodyMatch) {
              const candidate = bodyMatch[0];
              if (fs.existsSync(candidate)) {
                contractFile = candidate;
              }
            }

            // Fallback: fuzzy branch name matching with normalization
            if (!contractFile) {
              const keyword = branch
                .replace(/^(feature|fix|chore|refactor)\//, '');

              if (keyword && fs.existsSync('docs/contracts')) {
                const files = fs.readdirSync('docs/contracts');
                // Escape regex metacharacters, then normalize hyphens/underscores
                const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const normalizedKeyword = escaped.replace(/[-_]/g, '[-_]');
                const regex = new RegExp(normalizedKeyword, 'i');
                const matches = files
                  .filter(f => f !== '_template.md' && f.endsWith('.md'))
                  .filter(f => regex.test(f.replace(/[-_]/g, '-')));

                if (matches.length === 1) {
                  contractFile = `docs/contracts/${matches[0]}`;
                } else if (matches.length > 1) {
                  core.setOutput('found', 'ambiguous');
                  core.setOutput('matches', matches.join(', '));
                  return;
                }
              }
            }

            if (contractFile && fs.existsSync(contractFile)) {
              core.setOutput('found', 'true');
              core.setOutput('contract_file', contractFile);
            } else {
              core.setOutput('found', 'false');
            }

      - name: 评论契约链接（找到时，仅 opened 触发）
        if: steps.find-contract.outputs.found == 'true' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📋 **关联契约自动检测**\n\n找到契约文件：\`${{ steps.find-contract.outputs.contract_file }}\`\n\n请在合并前确认契约中所有 ⚠️ 待确认项已解决。`
            })

      - name: 评论契约歧义（多个匹配，仅 opened 触发）
        if: steps.find-contract.outputs.found == 'ambiguous' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📋 **关联契约自动检测**\n\n⚠️ 找到多个匹配的契约文件：${{ steps.find-contract.outputs.matches }}\n\n请在 PR 描述的「关联契约」部分明确填写完整路径，例如：\n\`契约文件：\`docs/contracts/2024-03-15_auth_register-login.md\`\``
            })

      - name: 评论未找到契约（未找到时，仅 opened 触发）
        if: steps.find-contract.outputs.found == 'false' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📋 **关联契约自动检测**\n\n⚠️ 未找到匹配的契约文件。\n\n如果这是新功能 PR，请在 PR 描述中明确填写：\n\`契约文件：\`docs/contracts/YYYY-MM-DD_模块_功能.md\`\`\n\n如果这是 Bug 修复或重构，可忽略此提示。`
            })
