name: Link Contract

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  link-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 查找关联契约
        id: find-contract
        uses: ./.github/actions/find-contract
        with:
          pr_body: ${{ github.event.pull_request.body }}
          branch: ${{ github.event.pull_request.head.ref }}

      - name: 评论契约链接（找到时，仅 opened 触发）
        if: steps.find-contract.outputs.found == 'true' && github.event.action == 'opened'
        uses: actions/github-script@v7
        env:
          CONTRACT_FILE: ${{ steps.find-contract.outputs.contract_file }}
        with:
          script: |
            const contractFile = process.env.CONTRACT_FILE;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📋 **关联契约自动检测**\n\n找到契约文件：\`${contractFile}\`\n\n请在合并前确认契约中所有 ⚠️ 待确认项已解决。`
            })

      - name: 评论契约歧义（多个匹配，仅 opened 触发）
        if: steps.find-contract.outputs.found == 'ambiguous' && github.event.action == 'opened'
        uses: actions/github-script@v7
        env:
          MATCHES: ${{ steps.find-contract.outputs.matches }}
        with:
          script: |
            const matches = process.env.MATCHES;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📋 **关联契约自动检测**\n\n⚠️ 找到多个匹配的契约文件：${matches}\n\n请在 PR 描述的「关联契约」部分明确填写完整路径，例如：\n\`契约文件：docs/contracts/2024-03-15_auth_register-login.md\``
            })

      - name: 评论未找到契约（未找到时，仅 opened 触发）
        if: steps.find-contract.outputs.found == 'false' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📋 **关联契约自动检测**\n\n⚠️ 未找到匹配的契约文件。\n\n如果这是新功能 PR，请在 PR 描述中明确填写：\n\`契约文件：docs/contracts/YYYY-MM-DD_模块_功能.md\`\n\n如果这是 Bug 修复或重构，可忽略此提示。`
            })
